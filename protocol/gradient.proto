syntax = "proto3";

package locdist.v1;

option go_package = "generated/gradient";

// =====================================================
// Parameter Metadata
// =====================================================

message ParameterMetadata {

  string name = 1;

  repeated int64 shape = 2;

  int64 numel = 3;

  string dtype = 4;
}


// =====================================================
// Gradient Chunk
// =====================================================

message GradientChunk {

  ParameterMetadata metadata = 1;

  bool has_grad = 2;

  bytes data = 3;

  uint64 byte_size = 4;
}


// =====================================================
// Runtime → Worker Service
// =====================================================

message GradientSubmission {

  uint32 runtime_version = 1;

  string job_id = 2;

  string worker_id = 3;

  repeated GradientChunk chunks = 4;
}


// =====================================================
// Worker Service → Runtime
// =====================================================

message AggregatedGradientResponse {

  uint32 runtime_version = 1;

  string job_id = 2;

  uint32 participating_workers = 3;

  uint64 aggregation_round = 4;

  repeated GradientChunk chunks = 5;
}

// =====================================================
// Worker Registration and Status
// =====================================================

enum WorkerStatus {

  WORKER_STATUS_UNKNOWN = 0;

  WORKER_STATUS_IDLE = 1;

  WORKER_STATUS_PREPARING = 2;

  WORKER_STATUS_INSTALLING = 3;

  WORKER_STATUS_RUNNING = 4;

  WORKER_STATUS_COMPLETED = 5;

  WORKER_STATUS_FAILED = 6;
}

message RegisterWorkerRequest {

  string worker_id = 1;

  string host = 2;

  string grpc_port = 3;

  string master_id = 4;

  string pairing_token = 5;
}

// =====================================================
// Worker Pairing
// =====================================================

enum PairingDecision {

  PAIRING_DECISION_UNKNOWN = 0;

  PAIRING_DECISION_ACCEPTED = 1;

  PAIRING_DECISION_REJECTED = 2;
}

message PairWorkerRequest {

  string request_id = 1;

  string master_id = 2;

  string master_name = 3;

  string master_host = 4;

  string master_grpc_port = 5;

  string worker_id = 6;

  string pairing_token = 7;
}

message PairWorkerResponse {

  string request_id = 1;

  PairingDecision decision = 2;

  string message = 3;
}

message UnpairWorkerRequest {

  string worker_id = 1;

  string master_id = 2;

  string pairing_token = 3;
}

message UnpairWorkerResponse {

  bool unpaired = 1;
}

message WorkerHeartbeat {

  string worker_id = 1;

  string master_id = 2;

  string pairing_token = 3;

  WorkerStatus status = 4;

  string job_id = 5;
}

message WorkerHeartbeatResponse {

  bool accepted = 1;

  int64 server_unix_time = 2;
}

message WorkerOfflineRequest {

  string worker_id = 1;

  string master_id = 2;

  string pairing_token = 3;
}

message WorkerOfflineResponse {

  bool acknowledged = 1;
}

// =====================================================
// Workspace Distribution
// =====================================================

message PrepareWorkspaceRequest {

  string job_id = 1;

  string worker_id = 2;

  string master_id = 3;

  string pairing_token = 4;

  string entrypoint = 5;

  string dataset_path = 6;

  bytes workspace_zip = 7;
}

message PrepareWorkspaceResponse {

  string job_id = 1;

  bool prepared = 2;

  string workspace_path = 3;
}

message RegisterWorkerResponse {

  string worker_id = 1;

  bool registered = 2;
}

message WorkerStatusUpdate {

  string worker_id = 1;

  WorkerStatus status = 2;

  string job_id = 3;
}

message WorkerStatusResponse {

  string worker_id = 1;

  WorkerStatus status = 2;
}


// =====================================================
// RPC Service
// =====================================================

service WorkerBridge {

  rpc SynchronizeGradients(
    GradientSubmission
  ) returns (
    AggregatedGradientResponse
  );

  rpc RegisterWorker(
    RegisterWorkerRequest
  ) returns (
    RegisterWorkerResponse
  );

  rpc UpdateWorkerStatus(
    WorkerStatusUpdate
  ) returns (
    WorkerStatusResponse
  );

  rpc PairWorker(
    PairWorkerRequest
  ) returns (
    PairWorkerResponse
  );

  rpc UnpairWorker(
    UnpairWorkerRequest
  ) returns (
    UnpairWorkerResponse
  );

  rpc Heartbeat(
    WorkerHeartbeat
  ) returns (
    WorkerHeartbeatResponse
  );

  rpc GoingOffline(
    WorkerOfflineRequest
  ) returns (
    WorkerOfflineResponse
  );

  rpc PrepareWorkspace(
    PrepareWorkspaceRequest
  ) returns (
    PrepareWorkspaceResponse
  );
}
